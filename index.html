<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headtrick IPv4</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Inter',sans-serif;
    height:100vh;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* partículas */
#particles-canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* container pequeno igual original */
.container{
    position:relative;
    z-index:10;

    text-align:center;

    padding:20px;

    animation:fadeIn .8s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* discord */
.discord-link{
    margin-bottom:28px;
}

.discord-link a{
    color:#ef4444;
    text-decoration:none;

    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;

    transition:.3s;
}

.discord-link a:hover{
    color:#ff6b6b;
    text-shadow:0 0 12px rgba(239,68,68,.5);
}

/* label */
.label{
    font-size:11px;
    color:#666;

    letter-spacing:3px;
    text-transform:uppercase;

    margin-bottom:12px;
}

/* ipv4 */
.ip-display{
    font-size:52px;
    font-weight:300;

    letter-spacing:2px;

    font-family:monospace;

    margin-bottom:26px;

    transition:.3s;
}

.loading{
    font-size:18px;
    color:#777;
}

.proxy{
    color:#ef4444;
    text-shadow:0 0 18px rgba(239,68,68,.5);
}

/* aviso */
.proxy-warning{
    display:none;

    color:#ef4444;
    font-size:13px;

    margin-bottom:18px;

    animation:fade .4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(-8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* botão */
.copy-btn{
    position:relative;

    background:transparent;

    border:2px dashed rgba(239,68,68,.4);

    color:#ef4444;

    padding:12px 38px;

    border-radius:6px;

    font-size:13px;
    font-weight:500;

    letter-spacing:2px;
    text-transform:uppercase;

    cursor:pointer;

    transition:.3s;

    overflow:hidden;
}

.copy-btn:hover{
    border-color:#ef4444;

    color:#ff6b6b;

    box-shadow:
        0 0 15px rgba(239,68,68,.2),
        0 0 35px rgba(239,68,68,.08);

    transform:translateY(-2px);
}

.copy-btn:active{
    transform:scale(.97);
}

.copy-btn.copied{
    background:rgba(239,68,68,.08);

    border-color:#ff6b6b;
}

/* brilho botão */
.copy-btn::before{
    content:'';

    position:absolute;
    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.15),
        transparent
    );

    transition:.6s;
}

.copy-btn:hover::before{
    left:100%;
}

/* responsivo */
@media(max-width:600px){

    .ip-display{
        font-size:34px;
    }

}
</style>
</head>

<body>

<canvas id="particles-canvas"></canvas>

<div class="container">

    <div class="discord-link">
        <a href="https://discord.gg/headtrick" target="_blank">
            discord.gg/headtrick
        </a>
    </div>

    <div class="label">
        Seu IPv4
    </div>

    <div class="ip-display loading" id="ip">
        carregando...
    </div>

    <div class="proxy-warning" id="proxyWarning">
        ⚠ Proxy detectada
    </div>

    <button class="copy-btn" id="copyBtn" onclick="copyIP()">
        <span id="btnText">📋 Copiar</span>
    </button>

</div>

<script>
/* partículas */
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');

canvas.width = innerWidth;
canvas.height = innerHeight;

const particles = [];
const PARTICLE_COUNT = 65;

class Particle{
    constructor(){

        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;

        this.size = Math.random() * 2 + .5;

        this.speedX = (Math.random() - .5) * .5;
        this.speedY = (Math.random() - .5) * .5;

        this.opacity = Math.random() * .2 + .05;
    }

    update(){

        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x > canvas.width) this.x = 0;
        if(this.x < 0) this.x = canvas.width;

        if(this.y > canvas.height) this.y = 0;
        if(this.y < 0) this.y = canvas.height;
    }

    draw(){

        ctx.fillStyle = `rgba(239,68,68,${this.opacity})`;

        ctx.beginPath();

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

        ctx.fill();
    }
}

for(let i=0;i<PARTICLE_COUNT;i++){
    particles.push(new Particle());
}

function connectParticles(){

    for(let a=0;a<particles.length;a++){

        for(let b=a;b<particles.length;b++){

            const dx = particles[a].x - particles[b].x;
            const dy = particles[a].y - particles[b].y;

            const distance = dx * dx + dy * dy;

            if(distance < 13000){

                ctx.strokeStyle = 'rgba(239,68,68,.05)';
                ctx.lineWidth = 1;

                ctx.beginPath();

                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);

                ctx.stroke();
            }
        }
    }
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.update();
        p.draw();
    });

    connectParticles();

    requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize',()=>{

    canvas.width = innerWidth;
    canvas.height = innerHeight;

});

/* PEGAR IPV4 REAL */
const ipElement = document.getElementById('ip');
const warningElement = document.getElementById('proxyWarning');

const VPS_IP = '177.7.56.197';

/* usando api que retorna ipv4 corretamente */
fetch('https://ipv4.icanhazip.com/')
.then(res => res.text())
.then(ip => {

    ip = ip.trim();

    ipElement.textContent = ip;
    ipElement.classList.remove('loading');

    if(ip === VPS_IP){

        warningElement.style.display = 'block';

        ipElement.classList.add('proxy');
    }

})
.catch(err => {

    console.error(err);

    ipElement.textContent = 'Erro ao obter IP';

    ipElement.classList.remove('loading');

});

/* copiar */
function copyIP(){

    const ip = ipElement.textContent;

    if(
        ip === 'carregando...' ||
        ip === 'Erro ao obter IP'
    ) return;

    navigator.clipboard.writeText(ip);

    const btn = document.getElementById('copyBtn');
    const btnText = document.getElementById('btnText');

    btn.classList.add('copied');

    btnText.innerHTML = '✔ Copiado';

    setTimeout(()=>{

        btn.classList.remove('copied');

        btnText.innerHTML = '📋 Copiar';

    },2000);
}
</script>

</body>
</html>
