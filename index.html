<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA IP CHECK</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(140deg,#0b0000,#1a0000,#300000);
color:white;
}

.container{
background:#140000;
padding:45px;
border-radius:12px;
text-align:center;
box-shadow:0 0 35px rgba(255,0,0,0.6);
width:340px;
}

h1{
color:#ff2b2b;
margin-bottom:8px;
font-size:32px;
}

.discord{
color:#ff6666;
margin-bottom:25px;
font-size:15px;
}

button{
background:#ff0000;
border:none;
padding:12px 22px;
margin:6px;
border-radius:6px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#cc0000;
transform:scale(1.05);
}

#ipBox{
margin-top:20px;
background:#0c0000;
padding:12px;
border-radius:6px;
font-size:20px;
color:#ff4444;
word-break:break-all;
}

.copyBtn{
background:#990000;
}

.copyBtn:hover{
background:#770000;
}

</style>
</head>

<body>

<div class="container">

<h1>AURA IP</h1>

<div class="discord">discord.gg/aurabypass</div>

<button onclick="mostrarIP()">VER MEU IP</button>
<button class="copyBtn" onclick="copiarIP()">COPIAR IP</button>

<div id="ipBox">Clique em "VER MEU IP"</div>

</div>

<script>

let ipAtual = "";

function mostrarIP(){

document.getElementById("ipBox").innerText = "Carregando...";

fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {

ipAtual = data.ip;

document.getElementById("ipBox").innerText = data.ip;

});

}

function copiarIP(){

if(ipAtual === ""){
alert("Primeiro obtenha o IP");
return;
}

navigator.clipboard.writeText(ipAtual);

alert("IP copiado!");

}

</script>

</body>

</html>
