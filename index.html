<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURA IP CHECK</title>

<style>

body{
background:#0d0000;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:#1a0000;
padding:40px;
border-radius:10px;
box-shadow:0 0 30px red;
text-align:center;
width:320px;
}

h1{
color:#ff2b2b;
margin-bottom:10px;
}

.discord{
color:#ff5555;
margin-bottom:25px;
}

button{
background:#ff0000;
border:none;
padding:12px 25px;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#cc0000;
}

#ip{
margin-top:25px;
font-size:22px;
color:#ff4444;
}

</style>
</head>

<body>

<div class="container">

<h1>AURA IP</h1>

<div class="discord">discord.gg/aurabypass</div>

<button onclick="mostrarIP()">VER MEU IP</button>

<div id="ip"></div>

</div>

<script>

function mostrarIP(){

document.getElementById("ip").innerText = "Carregando...";

fetch("https://api.ipify.org?format=text")
.then(response => response.text())
.then(ip => {

document.getElementById("ip").innerHTML = "Seu IPv4: <b>"+ip+"</b>";

})
.catch(() => {

document.getElementById("ip").innerText = "Erro ao obter IP";

});

}

</script>

</body>
</html>
